naftiko: 1.0.0-alpha2
info:
  label: Apache EventMesh Admin API — Topic
  description: 'Apache EventMesh Admin API — Topic. 3 operations. Lead operation: Apache EventMesh Create Topic. Self-contained
    Naftiko capability covering one Apache Event Mesh business surface.'
  tags:
  - Apache Event Mesh
  - Topic
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_EVENT_MESH_API_KEY: APACHE_EVENT_MESH_API_KEY
capability:
  consumes:
  - type: http
    namespace: eventmesh-admin-topic
    baseUri: http://localhost:10106
    description: Apache EventMesh Admin API — Topic business capability. Self-contained, no shared references.
    resources:
    - name: topic-create
      path: /topic/create
      operations:
      - name: createtopic
        method: POST
        description: Apache EventMesh Create Topic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: topic-delete
      path: /topic/delete
      operations:
      - name: deletetopic
        method: DELETE
        description: Apache EventMesh Delete Topic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: topic
          in: query
          type: string
          required: true
    - name: topic-list
      path: /topic/list
      operations:
      - name: listtopics
        method: GET
        description: Apache EventMesh List All Topics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: eventmesh-admin-topic-rest
    port: 8080
    description: REST adapter for Apache EventMesh Admin API — Topic. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/topic/create
      name: topic-create
      description: REST surface for topic-create.
      operations:
      - method: POST
        name: createtopic
        description: Apache EventMesh Create Topic
        call: eventmesh-admin-topic.createtopic
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/topic/delete
      name: topic-delete
      description: REST surface for topic-delete.
      operations:
      - method: DELETE
        name: deletetopic
        description: Apache EventMesh Delete Topic
        call: eventmesh-admin-topic.deletetopic
        with:
          topic: rest.topic
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/topic/list
      name: topic-list
      description: REST surface for topic-list.
      operations:
      - method: GET
        name: listtopics
        description: Apache EventMesh List All Topics
        call: eventmesh-admin-topic.listtopics
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: eventmesh-admin-topic-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache EventMesh Admin API — Topic. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apache-eventmesh-create-topic
      description: Apache EventMesh Create Topic
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: eventmesh-admin-topic.createtopic
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-eventmesh-delete-topic
      description: Apache EventMesh Delete Topic
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: eventmesh-admin-topic.deletetopic
      with:
        topic: tools.topic
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-eventmesh-list-all-topics
      description: Apache EventMesh List All Topics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: eventmesh-admin-topic.listtopics
      outputParameters:
      - type: object
        mapping: $.
