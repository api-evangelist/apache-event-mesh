naftiko: 1.0.0-alpha2
info:
  label: Apache EventMesh Event Streaming
  description: Unified capability for event-driven architectures using Apache EventMesh — managing topics, subscriptions,
    and publishing CloudEvents. Designed for platform engineers and developers building distributed event streaming pipelines.
  tags:
  - Apache EventMesh
  - Event-Driven
  - CloudEvents
  - Messaging
  - Platform Engineering
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    EVENTMESH_BASE_URL: EVENTMESH_BASE_URL
capability:
  consumes:
  - type: http
    namespace: eventmesh-admin
    baseUri: http://localhost:10106
    description: Apache EventMesh Admin REST API
    resources:
    - name: topics
      path: /eventmesh/topic
      description: Manage EventMesh topics
      operations:
      - name: list-topics
        method: GET
        description: List all registered EventMesh topics
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-topic
        method: PUT
        description: Create a new EventMesh topic
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            topic: '{{tools.topic}}'
    - name: subscriptions
      path: /eventmesh/subscribe
      description: Manage event subscriptions
      operations:
      - name: create-subscription
        method: POST
        description: Create a new event subscription
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            topic: '{{tools.topic}}'
            url: '{{tools.url}}'
      - name: delete-subscription
        method: DELETE
        description: Delete an event subscription
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: events
      path: /eventmesh/publish
      description: Publish events
      operations:
      - name: publish-event
        method: POST
        description: Publish a CloudEvent to EventMesh
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            topic: '{{tools.topic}}'
            content: '{{tools.content}}'
  exposes:
  - type: rest
    port: 8080
    namespace: eventmesh-streaming-api
    description: Unified REST API for Apache EventMesh event streaming.
    resources:
    - path: /v1/topics
      name: topics
      description: Manage EventMesh topics
      operations:
      - method: GET
        name: list-topics
        description: List all EventMesh topics
        call: eventmesh-admin.list-topics
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: create-topic
        description: Create a new EventMesh topic
        call: eventmesh-admin.create-topic
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions
      name: subscriptions
      description: Manage event subscriptions
      operations:
      - method: POST
        name: create-subscription
        description: Subscribe to EventMesh topics
        call: eventmesh-admin.create-subscription
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events
      name: events
      description: Publish events
      operations:
      - method: POST
        name: publish-event
        description: Publish a CloudEvent
        call: eventmesh-admin.publish-event
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: eventmesh-streaming-mcp
    transport: http
    description: MCP server for AI-assisted Apache EventMesh event streaming.
    tools:
    - name: list-eventmesh-topics
      description: List all topics registered in EventMesh
      hints:
        readOnly: true
        openWorld: true
      call: eventmesh-admin.list-topics
      outputParameters:
      - type: object
        mapping: $.
    - name: create-eventmesh-topic
      description: Create a new EventMesh topic
      hints:
        readOnly: false
        destructive: false
      call: eventmesh-admin.create-topic
      outputParameters:
      - type: object
        mapping: $.
    - name: subscribe-to-topic
      description: Subscribe a consumer to an EventMesh topic
      hints:
        readOnly: false
        destructive: false
      call: eventmesh-admin.create-subscription
      outputParameters:
      - type: object
        mapping: $.
    - name: publish-cloud-event
      description: Publish a CloudEvent to an EventMesh topic
      hints:
        readOnly: false
        destructive: false
      call: eventmesh-admin.publish-event
      outputParameters:
      - type: object
        mapping: $.
