naftiko: 1.0.0-alpha2
info:
  label: Apache EventMesh Admin API — Subscription
  description: 'Apache EventMesh Admin API — Subscription. 1 operations. Lead operation: Apache EventMesh Query Subscriptions.
    Self-contained Naftiko capability covering one Apache Event Mesh business surface.'
  tags:
  - Apache Event Mesh
  - Subscription
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_EVENT_MESH_API_KEY: APACHE_EVENT_MESH_API_KEY
capability:
  consumes:
  - type: http
    namespace: eventmesh-admin-subscription
    baseUri: http://localhost:10106
    description: Apache EventMesh Admin API — Subscription business capability. Self-contained, no shared references.
    resources:
    - name: subscription-query
      path: /subscription/query
      operations:
      - name: querysubscriptions
        method: GET
        description: Apache EventMesh Query Subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: eventmesh-admin-subscription-rest
    port: 8080
    description: REST adapter for Apache EventMesh Admin API — Subscription. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/subscription/query
      name: subscription-query
      description: REST surface for subscription-query.
      operations:
      - method: GET
        name: querysubscriptions
        description: Apache EventMesh Query Subscriptions
        call: eventmesh-admin-subscription.querysubscriptions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: eventmesh-admin-subscription-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache EventMesh Admin API — Subscription. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: apache-eventmesh-query-subscriptions
      description: Apache EventMesh Query Subscriptions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: eventmesh-admin-subscription.querysubscriptions
      outputParameters:
      - type: object
        mapping: $.
