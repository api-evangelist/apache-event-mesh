aid: apache-event-mesh
name: Apache EventMesh
description: >-
  Apache EventMesh is a dynamic event-driven application runtime used to
  decouple the application and backend middleware layer, providing a
  serverless platform for building distributed event-driven architectures
  with support for CloudEvents and multiple messaging protocols.
