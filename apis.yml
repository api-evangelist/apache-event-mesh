aid: apache-event-mesh
name: Apache EventMesh
description: >-
  Apache EventMesh is a dynamic event-driven application runtime used to decouple the application and backend middleware layer, providing a serverless platform for building distributed event-driven architectures with support for CloudEvents and multiple messaging protocols including HTTP, TCP, and gRPC.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Apache
  - CloudEvents
  - Event-Driven
  - Messaging
  - Open Source
  - Pub-Sub
  - Serverless
url: >-
  https://raw.githubusercontent.com/api-evangelist/apache-event-mesh/refs/heads/main/apis.yml
created: '2026-03-26'
modified: '2026-04-19'
specificationVersion: '0.19'
apis:
  - aid: apache-event-mesh:eventmesh-admin-api
    name: Apache EventMesh Admin API
    description: >-
      HTTP endpoints for managing the EventMesh runtime including topic management, subscription management, event publishing via HTTP, client monitoring, and runtime metrics.
    humanURL: https://eventmesh.apache.org/docs/instruction/quickstart
    baseURL: http://localhost:10106
    tags:
      - Admin
      - CloudEvents
      - REST API
      - Topics
    properties:
      - type: Documentation
        url: https://eventmesh.apache.org/docs/introduction
      - type: OpenAPI
        url: openapi/eventmesh-admin.yml
      - type: JSONSchema
        url: json-schema/eventmesh-admin-cloud-event-schema.json
      - type: JSON-LD
        url: json-ld/apache-event-mesh-admin-context.jsonld
  - aid: apache-event-mesh:eventmesh-messaging-api
    name: Apache EventMesh Messaging API
    description: >-
      Event-driven messaging via TCP, HTTP, and gRPC protocols. Events follow the CloudEvents specification. Supports pub-sub, request-reply, and broadcast messaging patterns.
    humanURL: https://eventmesh.apache.org/docs/sdk-java/tcp-sdk-usage
    tags:
      - CloudEvents
      - Event-Driven
      - Messaging
      - Pub-Sub
    properties:
      - type: Documentation
        url: https://eventmesh.apache.org/docs/sdk-java/tcp-sdk-usage
      - type: AsyncAPI
        url: asyncapi/eventmesh-messaging.yml
